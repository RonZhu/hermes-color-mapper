<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermès Color Mapper</title>
  <style>
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;background:#f6f7f9;color:#111}
    .wrap{max-width:980px;margin:36px auto;padding:0 16px}
    h1{font-size:28px;margin:0 0 6px}
    .sub{color:#666;margin-bottom:18px}
    .search{display:flex;gap:8px;align-items:center}
    input{flex:1;padding:12px 14px;border-radius:10px;border:1px solid #d5d9e2;font-size:16px}
    .muted{font-size:12px;color:#777;margin-top:8px}
    .card{background:#fff;border:1px solid #e6e8ef;border-radius:12px;padding:14px;margin-top:14px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .name{font-size:20px;font-weight:700;margin-bottom:6px}
    .grid{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:10px;margin:8px 0 12px}
    .k{font-size:12px;color:#666}
    .v{font-size:15px}
    .chips{display:flex;flex-wrap:wrap;gap:6px}
    .chip{font-size:12px;padding:3px 8px;background:#f0f3fa;border:1px solid #dae1f2;border-radius:999px}
    .ex{margin-top:10px}
    .ex li{margin:4px 0}
    a{color:#1c5ed6;text-decoration:none}
    .empty{padding:24px;color:#666;text-align:center}
    @media (max-width:700px){.grid{grid-template-columns:repeat(2,minmax(120px,1fr));}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Hermès Color Mapper</h1>
    <div class="sub">输入中/英/日/法任意颜色名，返回多语对照 + 实际商品样本（金具/包型）</div>
    <div class="search">
      <input id="q" placeholder="例如：エトゥープ / Etoupe / Noir / Rouge H" />
    </div>
    <div class="muted" id="meta">Loading…</div>
    <div id="results"></div>
  </div>

  <script>
    let db = null;

    function norm(s){
      return (s||'').toLowerCase().normalize('NFKC').replace(/\s+/g,' ').trim();
    }

    const QUERY_SYNONYMS = {
      '阳光红': ['ルージュピーマン','rouge piment','rouge','红色'],
      '愛马仕红': ['ルージュアッシュ','rouge h','hermes red'],
      '爱马仕红': ['ルージュアッシュ','rouge h','hermes red'],
      '奶昔白': ['ナタ','nata','クレ','craie'],
      '锦葵紫': ['モーヴシルベストル','mauve sylvestre']
    };

    function expandQuery(q){
      const arr = [q];
      const extra = QUERY_SYNONYMS[q] || [];
      for(const x of extra) arr.push(norm(x));
      return [...new Set(arr.filter(Boolean))];
    }

    function score(item, q){
      if(!q) return 1;
      const qs = expandQuery(q);
      const hay = [item.ja,item.en,item.fr,item.zh,...(item.aliases||[])].map(norm);
      let best = 0;
      for(const qq of qs){
        for(const h of hay){
          if(!h) continue;
          if(h===qq) best = Math.max(best, 100);
          else if(h.startsWith(qq)) best = Math.max(best, 80);
          else if(h.includes(qq)) best = Math.max(best, 60);
        }
      }
      return best;
    }

    function render(items){
      const el = document.getElementById('results');
      if(!items.length){
        el.innerHTML = '<div class="card empty">没有找到匹配项。试试日文名或英文名。</div>';
        return;
      }
      el.innerHTML = items.map(x => {
        const aliases = (x.aliases||[]).filter(Boolean);
        const ex = (x.examples||[]).slice(0,6);
        return `
          <div class="card">
            <div class="name">${x.ja || x.en || 'Unknown'}</div>
            <div class="grid">
              <div><div class="k">中文</div><div class="v">${x.zh||'-'}</div></div>
              <div><div class="k">English</div><div class="v">${x.en||'-'}</div></div>
              <div><div class="k">日本語</div><div class="v">${x.ja||'-'}</div></div>
              <div><div class="k">Français</div><div class="v">${x.fr||'-'}</div></div>
            </div>
            ${aliases.length?`<div class="chips">${aliases.slice(0,10).map(a=>`<span class="chip">${a}</span>`).join('')}</div>`:''}
            <div class="ex">
              <div class="k">样本（包型 / 金具）</div>
              <ul>
                ${ex.map(e=>`<li>${e.bag||'未识别包型'} / ${e.hardware||'未识别金具'} · <a href="${e.url}" target="_blank" rel="noopener">查看商品</a></li>`).join('')}
              </ul>
            </div>
          </div>
        `;
      }).join('');
    }

    async function boot(){
      const res = await fetch('./data/colors.json');
      db = await res.json();
      const dt = new Date((db.generatedAt||0)*1000);
      document.getElementById('meta').textContent = `来源: ${db.source} ｜ 颜色条目: ${db.count} ｜ 生成: ${dt.toLocaleString()}`;
      run();
    }

    function run(){
      const q = norm(document.getElementById('q').value);
      const items = (db?.items||[])
        .map(it => ({it, s: score(it, q)}))
        .filter(x => x.s > 0)
        .sort((a,b)=>b.s-a.s)
        .slice(0,20)
        .map(x=>x.it);
      render(items);
    }

    document.getElementById('q').addEventListener('input', run);
    boot().catch(err=>{
      document.getElementById('meta').textContent = '加载失败：' + err.message;
    });
  </script>
</body>
</html>
